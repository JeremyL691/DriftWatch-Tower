<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1640" viewBox="0 0 1280 1640" fill="none" font-family="'IBM Plex Sans','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F1E8"/>
      <stop offset="1" stop-color="#EFE6D8"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1">
      <stop offset="0" stop-color="#C04B2F" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#C04B2F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="1" cy="0.2" r="1">
      <stop offset="0" stop-color="#1F7A7A" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#1F7A7A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scenarioBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C04B2F"/>
      <stop offset="1" stop-color="#D36D38"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="1640" fill="url(#bg)"/>
  <rect width="640" height="640" fill="url(#glowA)"/>
  <rect x="640" y="0" width="640" height="640" fill="url(#glowB)"/>

  <!-- =================== HERO =================== -->
  <g>
    <!-- hero-copy -->
    <rect x="32" y="32" width="820" height="180" rx="28" fill="#FFFCF7" stroke="#E2D6C3"/>
    <text x="64" y="76" fill="#C04B2F" font-size="13" font-weight="700" letter-spacing="2.6">DRIFTWATCH TOWER</text>
    <text x="64" y="128" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="40" font-weight="700" letter-spacing="-1.5">Streaming quality observability</text>
    <text x="64" y="170" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="40" font-weight="700" letter-spacing="-1.5">without leaving the browser.</text>
    <text x="64" y="198" fill="#5F6F7B" font-size="15">Inspect alert bursts, source health, schema drift, and demo scenarios from one place.</text>

    <!-- hero-panel (quick links) -->
    <rect x="868" y="32" width="380" height="180" rx="28" fill="#FFFCF7" stroke="#E2D6C3"/>
    <text x="892" y="64" fill="#C04B2F" font-size="12" font-weight="700" letter-spacing="2.6">QUICK LINKS</text>
    <g font-size="14" fill="#13212C">
      <rect x="892" y="78" width="332" height="22" rx="11" fill="#EEE5D6"/>
      <text x="906" y="93">Overview</text>
      <rect x="892" y="104" width="332" height="22" rx="11" fill="#EEE5D6"/>
      <text x="906" y="119">Alerts</text>
      <rect x="892" y="130" width="332" height="22" rx="11" fill="#EEE5D6"/>
      <text x="906" y="145">Source Health</text>
      <rect x="892" y="156" width="332" height="22" rx="11" fill="#EEE5D6"/>
      <text x="906" y="171">Schema Registry</text>
      <rect x="892" y="182" width="332" height="22" rx="11" fill="#EEE5D6"/>
      <text x="906" y="197">Demo Scenarios</text>
    </g>
  </g>

  <!-- =================== OVERVIEW PANEL =================== -->
  <g>
    <rect x="32" y="236" width="1216" height="416" rx="28" fill="#FFFCF7" stroke="#E2D6C3"/>
    <text x="64" y="278" fill="#C04B2F" font-size="12" font-weight="700" letter-spacing="2.6">OVERVIEW</text>
    <text x="64" y="312" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="28" font-weight="700">System pulse</text>
    <rect x="1116" y="288" width="100" height="34" rx="17" fill="#13212C" fill-opacity="0.08"/>
    <text x="1138" y="310" fill="#13212C" font-size="13" font-weight="600">Refresh</text>

    <!-- Stat cards -->
