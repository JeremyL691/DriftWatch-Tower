      <text x="332" y="1156" fill="#5F6F7B" font-size="11">13:53:21</text>
      <text x="488" y="1156">0</text>
      <text x="608" y="1156">412</text>
      <text x="728" y="1156">0.0%</text>
      <text x="852" y="1156">2.4%</text>
      <text x="976" y="1156">0.7%</text>
      <text x="1108" y="1156" font-weight="700">42.0</text>
      <line x1="64" y1="1170" x2="1216" y2="1170" stroke="#E2D6C3"/>

      <text x="84" y="1196">coinbase</text>
      <rect x="216" y="1180" width="64" height="22" rx="11" fill="#C39230" fill-opacity="0.18"/>
      <text x="248" y="1196" text-anchor="middle" fill="#8F6000" font-weight="700">DEGRADED</text>
      <text x="332" y="1196" fill="#5F6F7B" font-size="11">14:02:09</text>
      <text x="488" y="1196">241</text>
      <text x="608" y="1196">2,884</text>
      <text x="728" y="1196">1.8%</text>
      <text x="852" y="1196">0.4%</text>
      <text x="976" y="1196">0.2%</text>
      <text x="1108" y="1196" font-weight="700">78.5</text>
    </g>
  </g>

  <!-- =================== SCHEMA REGISTRY PANEL =================== -->
  <g>
    <rect x="32" y="1252" width="1216" height="186" rx="28" fill="#FFFCF7" stroke="#E2D6C3"/>
    <text x="64" y="1294" fill="#C04B2F" font-size="12" font-weight="700" letter-spacing="2.6">SCHEMA REGISTRY</text>
    <text x="64" y="1328" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="26" font-weight="700">Baseline vs drift history</text>
    <text x="1216" y="1318" fill="#5F6F7B" font-size="12" text-anchor="end">Grouped by event type</text>

    <rect x="64" y="1350" width="1152" height="76" rx="18" fill="#FFFFFF" stroke="#E2D6C3"/>
    <rect x="64" y="1350" width="1152" height="32" fill="#13212C" fill-opacity="0.05"/>
    <g font-size="10" fill="#5F6F7B" letter-spacing="1.3" font-weight="700">
