      <rect x="244" y="1392" width="178" height="22" rx="11" fill="#13212C" fill-opacity="0.08"/>
      <text x="333" y="1408" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="11">a1f48c92ec71...</text>
      <rect x="444" y="1392" width="80" height="22" rx="11" fill="#C39230" fill-opacity="0.18"/>
      <text x="484" y="1408" text-anchor="middle" fill="#8F6000" font-weight="700">DRIFTING</text>
      <text x="588" y="1408" fill="#5F6F7B" font-size="11">2026-05-20 09:11</text>
      <text x="772" y="1408" fill="#5F6F7B" font-size="11">2026-05-27 14:02</text>
      <text x="976" y="1408" fill="#1F7A7A">&#9656; 3 version(s), 1 drifting</text>
