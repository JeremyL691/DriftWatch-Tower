      <text x="84" y="368" fill="#5F6F7B" font-size="13">Total Events</text>
      <text x="84" y="412" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="38" font-weight="700">12,847</text>

      <rect x="358" y="340" width="282" height="96" rx="20" fill="#FFFFFF" stroke="#E2D6C3"/>
      <text x="378" y="368" fill="#5F6F7B" font-size="13">Active Sources</text>
      <text x="378" y="412" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="38" font-weight="700">6</text>

      <rect x="652" y="340" width="282" height="96" rx="20" fill="#FFFFFF" stroke="#E2D6C3"/>
      <text x="672" y="368" fill="#5F6F7B" font-size="13">Alerts Last 24h</text>
      <text x="672" y="412" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="38" font-weight="700">23</text>

      <rect x="946" y="340" width="270" height="96" rx="20" fill="#FFFFFF" stroke="#E2D6C3"/>
      <text x="966" y="368" fill="#5F6F7B" font-size="13">Unhealthy Sources</text>
      <text x="966" y="412" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="38" font-weight="700">2</text>
    </g>

    <!-- Split: Latest Detector Activity + Recent Events -->
    <g>
      <!-- Latest Detector Activity -->
      <rect x="64" y="456" width="576" height="178" rx="20" fill="#FFFFFF" stroke="#E2D6C3"/>
      <text x="84" y="484" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="18" font-weight="700">Latest Detector Activity</text>
      <text x="616" y="484" fill="#5F6F7B" font-size="12" text-anchor="end">Recent alerts after schema-drift</text>

      <!-- alert item 1 (new, accented) -->
      <rect x="84" y="496" width="536" height="62" rx="14" fill="#FCE7DE" stroke="#C04B2F" stroke-opacity="0.45"/>
      <text x="100" y="518" fill="#13212C" font-size="13" font-weight="700">SCHEMA_DRIFT &#183; binance</text>
      <text x="100" y="536" fill="#5F6F7B" font-size="12">Added field: trade_venue. Hash diverged from baseline.</text>
      <rect x="100" y="544" width="84" height="16" rx="8" fill="#13212C" fill-opacity="0.08"/>
      <text x="142" y="556" fill="#13212C" font-size="11" text-anchor="middle" font-family="'IBM Plex Mono',monospace">market_tick</text>
      <text x="200" y="556" fill="#5F6F7B" font-size="11">2026-05-27 14:02:11</text>

      <!-- alert item 2 -->
      <rect x="84" y="566" width="536" height="62" rx="14" fill="#F4ECDE"/>
      <text x="100" y="588" fill="#13212C" font-size="13" font-weight="700">STALE_SOURCE &#183; nyse-feed</text>
      <text x="100" y="606" fill="#5F6F7B" font-size="12">No events received in 8m 42s (threshold 5m).</text>
      <rect x="100" y="614" width="84" height="16" rx="8" fill="#13212C" fill-opacity="0.08"/>
      <text x="142" y="626" fill="#13212C" font-size="11" text-anchor="middle" font-family="'IBM Plex Mono',monospace">market_tick</text>
      <text x="200" y="626" fill="#5F6F7B" font-size="11">2026-05-27 13:58:03</text>

      <!-- Recent Events -->
      <rect x="656" y="456" width="560" height="178" rx="20" fill="#FFFFFF" stroke="#E2D6C3"/>
      <text x="676" y="484" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="18" font-weight="700">Recent Events</text>
      <text x="1196" y="484" fill="#5F6F7B" font-size="12" text-anchor="end">Last 8 ingested</text>

      <rect x="676" y="496" width="520" height="62" rx="14" fill="#F4ECDE"/>
      <text x="692" y="518" fill="#13212C" font-size="13" font-weight="700">market_tick &#183; binance</text>
      <text x="692" y="536" fill="#5F6F7B" font-size="12">evt-3f4a82c1</text>
      <rect x="780" y="524" width="56" height="16" rx="8" fill="#1F7A7A" fill-opacity="0.16"/>
      <text x="808" y="536" fill="#115D5D" font-size="11" text-anchor="middle">CLEAN</text>
      <text x="692" y="556" fill="#5F6F7B" font-size="11">2026-05-27 14:02:14</text>

      <rect x="676" y="566" width="520" height="62" rx="14" fill="#F4ECDE"/>
      <text x="692" y="588" fill="#13212C" font-size="13" font-weight="700">market_tick &#183; coinbase</text>
      <text x="692" y="606" fill="#5F6F7B" font-size="12">evt-9c1d2eaf</text>
      <rect x="790" y="594" width="64" height="16" rx="8" fill="#C39230" fill-opacity="0.18"/>
      <text x="822" y="606" fill="#8F6000" font-size="11" text-anchor="middle">FLAGGED</text>
      <text x="692" y="626" fill="#5F6F7B" font-size="11">2026-05-27 14:02:09</text>
    </g>
  </g>

  <!-- =================== ALERTS PANEL =================== -->
