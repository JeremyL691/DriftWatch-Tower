      <text x="356" y="800">SOURCE</text>
      <text x="468" y="800">EVENT TYPE</text>
      <text x="600" y="800">FIELD</text>
      <text x="724" y="800">MESSAGE</text>
      <text x="1024" y="800">CREATED</text>
      <text x="1156" y="800">EVIDENCE</text>
    </g>

    <!-- row 1 SCHEMA_DRIFT -->
    <g font-size="12" fill="#13212C">
      <rect x="80" y="824" width="140" height="22" rx="11" fill="#13212C" fill-opacity="0.1"/>
      <text x="150" y="840" text-anchor="middle" font-weight="700">SCHEMA_DRIFT</text>
      <rect x="240" y="824" width="60" height="22" rx="11" fill="#C04B2F" fill-opacity="0.15"/>
      <text x="270" y="840" text-anchor="middle" fill="#8A2E1A" font-weight="700">ERROR</text>
      <text x="356" y="840">binance</text>
      <text x="468" y="840" font-family="'IBM Plex Mono',monospace" font-size="11">market_tick</text>
      <text x="600" y="840" font-family="'IBM Plex Mono',monospace" font-size="11">trade_venue</text>
      <text x="724" y="840" fill="#5F6F7B">New field detected vs baseline schema</text>
      <text x="1024" y="840" fill="#5F6F7B" font-size="11">14:02:11</text>
      <text x="1156" y="840" fill="#1F7A7A">&#9656; View</text>
      <line x1="64" y1="858" x2="1216" y2="858" stroke="#E2D6C3"/>
    </g>

    <!-- row 2 STALE_SOURCE -->
    <g font-size="12" fill="#13212C">
      <rect x="80" y="866" width="140" height="22" rx="11" fill="#13212C" fill-opacity="0.1"/>
      <text x="150" y="882" text-anchor="middle" font-weight="700">STALE_SOURCE</text>
      <rect x="240" y="866" width="60" height="22" rx="11" fill="#C39230" fill-opacity="0.18"/>
      <text x="270" y="882" text-anchor="middle" fill="#8F6000" font-weight="700">WARN</text>
      <text x="356" y="882">nyse-feed</text>
      <text x="468" y="882" font-family="'IBM Plex Mono',monospace" font-size="11">market_tick</text>
      <text x="600" y="882" fill="#5F6F7B">-</text>
      <text x="724" y="882" fill="#5F6F7B">No events in 8m 42s (threshold 5m)</text>
      <text x="1024" y="882" fill="#5F6F7B" font-size="11">13:58:03</text>
      <text x="1156" y="882" fill="#1F7A7A">&#9656; View</text>
      <line x1="64" y1="900" x2="1216" y2="900" stroke="#E2D6C3"/>
    </g>

    <!-- row 3 DUPLICATE_EVENT -->
    <g font-size="12" fill="#13212C">
      <rect x="80" y="908" width="160" height="22" rx="11" fill="#13212C" fill-opacity="0.1"/>
      <text x="160" y="924" text-anchor="middle" font-weight="700">DUPLICATE_EVENT</text>
      <rect x="240" y="908" width="60" height="22" rx="11" fill="#C39230" fill-opacity="0.18"/>
      <text x="270" y="924" text-anchor="middle" fill="#8F6000" font-weight="700">WARN</text>
      <text x="356" y="924">coinbase</text>
      <text x="468" y="924" font-family="'IBM Plex Mono',monospace" font-size="11">market_tick</text>
      <text x="600" y="924" font-family="'IBM Plex Mono',monospace" font-size="11">event_id</text>
      <text x="724" y="924" fill="#5F6F7B">3 duplicate event_ids in 60s window</text>
      <text x="1024" y="924" fill="#5F6F7B" font-size="11">13:54:48</text>
      <text x="1156" y="924" fill="#1F7A7A">&#9656; View</text>
    </g>
  </g>

  <!-- =================== SOURCE HEALTH PANEL =================== -->
