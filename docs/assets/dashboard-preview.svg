  <!-- =================== DEMO SCENARIOS PANEL =================== -->
  <g>
    <rect x="32" y="1462" width="1216" height="156" rx="28" fill="#FFFCF7" stroke="#E2D6C3"/>
    <text x="64" y="1502" fill="#C04B2F" font-size="12" font-weight="700" letter-spacing="2.6">DEMO SCENARIOS</text>
    <text x="64" y="1536" fill="#13212C" font-family="Fraunces,Georgia,serif" font-size="22" font-weight="700">Trigger incidents on demand</text>
    <text x="1216" y="1526" fill="#5F6F7B" font-size="12" text-anchor="end">Dashboard refreshes after each run</text>

    <!-- 8 scenario buttons in a row -->
    <g font-size="12" fill="#FFFFFF" font-weight="600">
      <rect x="64"  y="1554" width="138" height="42" rx="21" fill="url(#scenarioBtn)"/>
      <text x="133" y="1580" text-anchor="middle">Normal Flow</text>
      <rect x="210" y="1554" width="138" height="42" rx="21" fill="url(#scenarioBtn)"/>
      <text x="279" y="1580" text-anchor="middle">Schema Drift</text>
      <rect x="356" y="1554" width="138" height="42" rx="21" fill="url(#scenarioBtn)"/>
      <text x="425" y="1580" text-anchor="middle">Duplicate Events</text>
      <rect x="502" y="1554" width="138" height="42" rx="21" fill="url(#scenarioBtn)"/>
      <text x="571" y="1580" text-anchor="middle">Late Events</text>
      <rect x="648" y="1554" width="138" height="42" rx="21" fill="url(#scenarioBtn)"/>
      <text x="717" y="1580" text-anchor="middle">Null Spike</text>
      <rect x="794" y="1554" width="138" height="42" rx="21" fill="url(#scenarioBtn)"/>
      <text x="863" y="1580" text-anchor="middle">Stale Source</text>
      <rect x="940" y="1554" width="138" height="42" rx="21" fill="url(#scenarioBtn)"/>
      <text x="1009" y="1580" text-anchor="middle">Anomaly Spike</text>
      <rect x="1086" y="1554" width="130" height="42" rx="21" fill="url(#scenarioBtn)"/>
