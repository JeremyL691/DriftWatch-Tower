# DriftWatch Tower — streaming data quality observability
# Single-node demo config; all services run via docker-compose

spring:
  application:
    name: driftwatch-tower
  datasource:
    url: jdbc:postgresql://localhost:5432/driftwatch
    username: driftwatch
    password: driftwatch
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      group-id: driftwatch-tower
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.driftwatch.event
        spring.json.value.default.type: com.driftwatch.event.DataEvent
    listener:
      missing-topics-fatal: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Detector configuration — all thresholds are externalized here
driftwatch:
  detector:
    duplicate:
      payload-window: PT5M
    late:
      threshold: PT5M
    null-spike:
      threshold: 0.2
      min-samples: 5
    anomaly-spike:
      baseline-windows: 2
      min-history-windows: 2
      ratio-threshold: 3.0
      min-current-count: 5
  source-health:
    default-stale-after: PT5M
    rss-stale-after: PT30M
    pipeline-stale-after: PT24H

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: driftwatch-tower
  endpoint:
    health:
      show-details: always
